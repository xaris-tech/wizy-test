<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Vision</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #1a1a1a;
    }
    .subtitle {
      color: #666;
      margin-bottom: 24px;
    }
    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      margin-bottom: 16px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover {
      border-color: #999;
    }
    .upload-area.has-file {
      border-color: #4CAF50;
      background: #f9f9f9;
    }
    .upload-area input {
      display: none;
    }
    .preview {
      max-width: 100%;
      max-height: 300px;
      border-radius: 4px;
      display: none;
      margin: 0 auto;
    }
    .upload-area.has-file .preview {
      display: block;
    }
    .upload-text {
      color: #666;
    }
    .upload-area.has-file .upload-text {
      display: none;
    }
    .question-area {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      min-height: 80px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: #4CAF50;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #45a049;
    }
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show {
      display: block;
    }
    .answer {
      background: #e8f5e9;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .spinner {
      display: none;
      width: 24px;
      height: 24px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gemini Vision</h1>
    <p class="subtitle">Upload an image and ask questions about it</p>

    <div class="error" id="error"></div>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*">
      <div class="preview" id="preview"></div>
      <div class="upload-text">
        <div>Click or drag to upload an image</div>
        <div style="font-size: 12px; margin-top: 4px;">Max 5MB</div>
      </div>
    </div>

    <div class="question-area">
      <label for="question">What would you like to know?</label>
      <textarea id="question" placeholder="What is in this image?"></textarea>
    </div>

    <button class="btn" id="submitBtn">Analyze Image</button>

    <div class="spinner" id="spinner"></div>
    <div class="answer" id="answer" style="display: none;"></div>
  </div>

  <script>
    const MAX_SIZE = 5 * 1024 * 1024;
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const question = document.getElementById('question');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const answerDiv = document.getElementById('answer');
    const errorDiv = document.getElementById('error');

    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', handleFile);

    function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > MAX_SIZE) {
        showError('File too large. Maximum size is 5MB.');
        return;
      }

      uploadArea.classList.add('has-file');
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.style.backgroundImage = `url(${e.target.result})`;
        preview.style.backgroundSize = 'contain';
        preview.style.backgroundRepeat = 'no-repeat';
        preview.style.backgroundPosition = 'center';
        preview.style.height = '200px';
      };
      reader.readAsDataURL(file);
      hideError();
    }

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.classList.add('show');
    }

    function hideError() {
      errorDiv.classList.remove('show');
    }

    async function analyze() {
      const file = fileInput.files[0];
      if (!file) {
        showError('Please select an image first.');
        return;
      }

      if (file.size > MAX_SIZE) {
        showError('File too large. Maximum size is 5MB.');
        return;
      }

      const questionText = question.value.trim();
      if (!questionText) {
        showError('Please enter a question.');
        return;
      }

      hideError();
      submitBtn.disabled = true;
      spinner.style.display = 'block';
      answerDiv.style.display = 'none';

      const formData = new FormData();
      formData.append('file', file);
      formData.append('question', questionText);

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || 'An error occurred');
        }

        answerDiv.textContent = data.answer || 'No answer received';
        answerDiv.style.display = 'block';
      } catch (err) {
        showError(err.message);
      } finally {
        submitBtn.disabled = false;
        spinner.style.display = 'none';
      }
    }

    submitBtn.addEventListener('click', analyze);
    question.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        analyze();
      }
    });
  </script>
</body>
</html>
