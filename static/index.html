<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Vision</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #1a1a1a;
    }
    .subtitle {
      color: #666;
      margin-bottom: 16px;
    }
    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px 16px;
      border: 2px solid #ddd;
      background: white;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      border-color: #4CAF50;
      background: #e8f5e9;
      color: #2e7d32;
    }
    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      margin-bottom: 16px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #999; }
    .upload-area.has-file {
      border-color: #4CAF50;
      background: #f9f9f9;
    }
    .upload-area input { display: none; }
    .preview {
      max-width: 100%;
      max-height: 300px;
      border-radius: 4px;
      display: none;
      margin: 0 auto;
    }
    .upload-area.has-file .preview { display: block; }
    .upload-text { color: #666; }
    .upload-area.has-file .upload-text { display: none; }
    .question-area { margin-bottom: 16px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; }
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      min-height: 80px;
      resize: vertical;
    }
    textarea:focus { outline: none; border-color: #4CAF50; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #45a049; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
    .answer {
      background: #e8f5e9;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .spinner {
      display: none;
      width: 24px;
      height: 24px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .thinking-card {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      border: 1px solid #2196F3;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 12px;
      text-align: center;
    }
    .thinking-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #1565C0;
      font-weight: 500;
    }
    .thinking-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
.timeline {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .step {
      padding: 10px 14px;
      border-radius: 6px;
      border-left: 3px solid;
      animation: fadeSlideIn 0.4s ease forwards;
      opacity: 0;
    }
    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .step-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .step-content {
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .step-think {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      border-color: #2196F3;
    }
    .step-think .step-header { color: #1565C0; }
    .step-code {
      background: linear-gradient(135deg, #263238 0%, #37474f 100%);
      border-color: #ff9800;
      color: #fff;
    }
    .step-code .step-header { color: #ffb74d; }
    .step-code .step-content {
      background: rgba(255,255,255,0.08);
      color: #a5d6a7;
      border-radius: 4px;
      padding: 8px;
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      font-size: 12px;
    }
    .step-output {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      border-color: #4CAF50;
    }
    .step-output .step-header { color: #2e7d32; }
    .step-output .step-content { color: #1b5e20; }
    .step-observe {
      background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
      border-color: #9c27b0;
    }
    .step-observe .step-header { color: #7b1fa2; }
    .step-observe .step-content {
      background: transparent;
      padding: 0;
    }
    .step-observe img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 4px;
      margin-top: 8px;
      border: 2px solid #9c27b0;
      object-fit: contain;
    }
    .final-answer {
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
      border: 2px solid #ff9800;
      border-radius: 8px;
      padding: 16px;
      margin-top: 12px;
      animation: fadeSlideIn 0.4s ease forwards;
    }
    .final-answer h3 {
      color: #e65100;
      margin-bottom: 8px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .final-answer p { white-space: pre-wrap; line-height: 1.6; font-size: 14px; }
    .preset-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .preset-btn {
      padding: 6px 12px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .preset-btn:hover {
      background: #e8f5e9;
      border-color: #4CAF50;
    }
    .session-area {
      margin-top: 16px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    .session-area h4 {
      margin-bottom: 8px;
      font-size: 14px;
    }
    .session-btns {
      display: flex;
      gap: 8px;
    }
    .session-btns .btn {
      flex: 1;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gemini Vision</h1>
    <p class="subtitle">Upload an image and ask questions about it</p>

    <div class="mode-toggle">
      <button class="mode-btn active" id="modeStandard" onclick="setMode('standard')">
        Standard Mode
      </button>
      <button class="mode-btn" id="modeAgentic" onclick="setMode('agentic')">
        Agentic Mode (with code execution)
      </button>
    </div>

    <div class="error" id="error"></div>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*">
      <div class="preview" id="preview"></div>
      <div class="upload-text">
        <div>Click or drag to upload an image</div>
        <div style="font-size: 12px; margin-top: 4px;">Max 5MB</div>
      </div>
    </div>

    <div class="question-area">
      <label for="question">What would you like to know?</label>
      <div class="preset-btns">
        <button class="preset-btn" onclick="setPreset('Count the Items')">🔢 Count the Items</button>
        <button class="preset-btn" onclick="setPreset('Read Serial Number')">📋 Read Serial Number</button>
        <button class="preset-btn" onclick="setPreset('Identify all components')">🔧 Identify Components</button>
        <button class="preset-btn" onclick="setPreset('Describe the condition')">📝 Describe Condition</button>
      </div>
      <textarea id="question" placeholder="What is in this image?"></textarea>
    </div>

    <button class="btn" id="submitBtn">Analyze Image</button>

    <div class="spinner" id="spinner"></div>
    <div class="thinking-card" id="thinkingCard" style="display: none;">
      <div class="thinking-content">
        <span class="thinking-dots"></span>
        <span>Gemini is Thinking...</span>
      </div>
    </div>
    <div class="answer" id="answer" style="display: none;"></div>
    <div class="timeline" id="timeline" style="display: none;"></div>
    
    <div class="session-area" id="sessionArea" style="display: none;">
      <h4>Continue this conversation?</h4>
      <textarea id="followup" placeholder="Ask a follow-up question..."></textarea>
      <div class="session-btns">
        <button class="btn" id="followupBtn">Ask Follow-up</button>
        <button class="btn" onclick="startNew()" style="background: #666;">New Image</button>
      </div>
    </div>
  </div>

  <script>
    const MAX_SIZE = 5 * 1024 * 1024;
    let currentMode = 'standard';
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const question = document.getElementById('question');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const thinkingCard = document.getElementById('thinkingCard');
    const answerDiv = document.getElementById('answer');
    const errorDiv = document.getElementById('error');
    const timeline = document.getElementById('timeline');
    const sessionArea = document.getElementById('sessionArea');
    const followup = document.getElementById('followup');
    const followupBtn = document.getElementById('followupBtn');
    let currentSessionId = null;
    let currentAgenticSessionId = null;

    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', handleFile);

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('modeStandard').classList.toggle('active', mode === 'standard');
      document.getElementById('modeAgentic').classList.toggle('active', mode === 'agentic');
      clearResults();
    }

    function setPreset(prompt) {
      question.value = prompt;
    }

    function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > MAX_SIZE) {
        showError('File too large. Max 5MB.');
        return;
      }
      uploadArea.classList.add('has-file');
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.style.backgroundImage = `url(${e.target.result})`;
        preview.style.backgroundSize = 'contain';
        preview.style.backgroundRepeat = 'no-repeat';
        preview.style.backgroundPosition = 'center';
        preview.style.height = '200px';
      };
      reader.readAsDataURL(file);
      hideError();
    }

    function showError(msg) {
      // Handle structured error or plain message
      if (typeof msg === 'object' && msg.message) {
        errorDiv.textContent = msg.message;
      } else {
        errorDiv.textContent = msg;
      }
      errorDiv.classList.add('show');
    }

    function hideError() {
      errorDiv.classList.remove('show');
    }

    function clearResults() {
      answerDiv.style.display = 'none';
      answerDiv.textContent = '';
      timeline.style.display = 'none';
      timeline.innerHTML = '';
      thinkingCard.style.display = 'none';
    }

    function renderTimeline(steps, finalAnswer) {
      timeline.innerHTML = '';
      steps.forEach((step, i) => {
        const stepDiv = document.createElement('div');
        stepDiv.className = `step step-${step.type}`;
        stepDiv.style.animationDelay = `${i * 0.15}s`;
        const icons = { think: '🤔', code: '🐍', output: '📊', observe: '🔍' };
        const labels = { think: 'Thinking', code: 'Code Execution', output: 'Output', observe: 'Observe' };
        let contentHtml = escapeHtml(step.content);
        
        if (step.type === 'observe' && step.image_data) {
          const mimeType = step.image_mime_type || 'image/png';
          contentHtml = `<img src="data:${mimeType};base64,${step.image_data}" alt="Intermediate result">`;
        }
        
        stepDiv.innerHTML = `
          <div class="step-header">${icons[step.type] || '📝'} ${labels[step.type] || step.type}</div>
          <div class="step-content">${contentHtml}</div>
        `;
        timeline.appendChild(stepDiv);
      });
      timeline.style.display = 'flex';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function createStepElement(step, index, isLastThink = false) {
      const stepDiv = document.createElement('div');
      stepDiv.className = `step step-${step.type}`;
      stepDiv.style.animationDelay = `${index * 0.15}s`;
      const icons = { think: '🤔', code: '🐍', output: '📊', observe: '🔍' };
      const labels = { think: 'Thinking', code: 'Code Execution', output: 'Output', observe: 'Observe' };
      
      // Override for final answer
      if (isLastThink) {
        icons.think = '✨';
        labels.think = 'Final Answer';
      }
      
      let contentHtml = escapeHtml(step.content || '');
      
      if (step.type === 'observe' && step.image_data) {
        const mimeType = step.image_mime_type || 'image/png';
        contentHtml = `<img src="data:${mimeType};base64,${step.image_data}" alt="Intermediate result">`;
      }
      
      stepDiv.innerHTML = `
        <div class="step-header">${icons[step.type] || '📝'} ${labels[step.type] || step.type}</div>
        <div class="step-content">${contentHtml}</div>
      `;
      return stepDiv;
    }

async function analyze() {
      const file = fileInput.files[0];
      if (!file) {
        showError('Please select an image first.');
        return;
      }
      if (file.size > MAX_SIZE) {
        showError('File too large. Max 5MB.');
        return;
      }
      const questionText = question.value.trim();
      if (!questionText) {
        showError('Please enter a question.');
        return;
      }
      hideError();
      clearResults();
      submitBtn.disabled = true;
      spinner.style.display = 'block';
      thinkingCard.style.display = 'block';
      answerDiv.textContent = 'Processing...';
      answerDiv.style.display = 'block';

      const formData = new FormData();
      formData.append('file', file);
      formData.append('question', questionText);

      try {
        if (currentMode === 'agentic') {
          // Use streaming endpoint for real-time step-by-step display
          const res = await fetch('/api/analyze/agentic/stream', {
            method: 'POST',
            body: formData
          });
          
          if (!res.ok) {
            const data = await res.json();
            const err = data.detail?.message ? data.detail : { message: data.detail || 'An error occurred' };
            throw new Error(err.message);
          }
          
          // Create session for agentic follow-up (hidden until stream completes)
          const sessionFormData = new FormData();
          sessionFormData.append('file', file);
          sessionFormData.append('agentic', 'true');
          const sessionRes = await fetch('/api/analyze/session', {
            method: 'POST',
            body: sessionFormData
          });
          let sessionCreated = false;
          if (sessionRes.ok) {
            const sessionData = await sessionRes.json();
            currentAgenticSessionId = sessionData.session_id;
            sessionCreated = true;
          }
          
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let stepIndex = 0;
          let thinkSteps = [];
          
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            
            // Parse SSE messages
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                try {
                  const step = JSON.parse(line.slice(6));
                  if (step.error) {
                    const err = step.error.message || step.error;
                    showError(err);
                    break;
                  }
                  if (step.type === 'done') {
                    spinner.style.display = 'none';
                    thinkingCard.style.display = 'none';
                    answerDiv.style.display = 'none';
                    // Show follow-up UI only after stream is complete
                    if (sessionCreated) {
                      sessionArea.style.display = 'block';
                    }
                    // Convert all think steps except last to "Thinking"
                    const allSteps = timeline.querySelectorAll('.step');
                    thinkSteps.forEach((idx, i) => {
                      if (i < thinkSteps.length - 1 && allSteps[idx]) {
                        allSteps[idx].className = 'step step-think';
                        allSteps[idx].querySelector('.step-header').innerHTML = '🤔 Thinking';
                      }
                    });
                    continue;
                  }
                  // First step arrived - hide spinner and thinking card, hide initial message
                  spinner.style.display = 'none';
                  thinkingCard.style.display = 'none';
                  answerDiv.style.display = 'none';
                  
                  // Collect think steps
                  if (step.type === 'think') {
                    thinkSteps.push(stepIndex);
                  }
                  
                  const isLastThink = step.type === 'think';
                  const stepEl = createStepElement(step, stepIndex++, isLastThink);
                  timeline.appendChild(stepEl);
                  timeline.style.display = 'flex';
                  // Scroll to bottom
                  timeline.scrollTop = timeline.scrollHeight;
                } catch (e) {}
              }
            }
          }
        } else {
          // Standard mode (non-streaming)
          const res = await fetch('/api/analyze', {
            method: 'POST',
            body: formData
          });
          const data = await res.json();
          if (!res.ok) {
            const err = data.detail?.message ? data.detail : { message: data.detail || 'An error occurred' };
            throw new Error(err.message);
          }
          
          // Create session for follow-up
          const sessionRes = await fetch('/api/analyze/session', {
            method: 'POST',
            body: formData
          });
          if (sessionRes.ok) {
            const sessionData = await sessionRes.json();
            currentSessionId = sessionData.session_id;
            sessionArea.style.display = 'block';
          }
          
          answerDiv.textContent = data.answer || 'No answer received';
          answerDiv.style.display = 'block';
        }
      } catch (err) {
        showError(err.message || 'An error occurred. Please try again.');
        answerDiv.style.display = 'none';
        spinner.style.display = 'none';
      } finally {
        submitBtn.disabled = false;
        spinner.style.display = 'none';
      }
    }

    submitBtn.addEventListener('click', analyze);
    followupBtn.addEventListener('click', handleFollowup);

    question.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) analyze();
    });

    followup.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) handleFollowup();
    });

    function startNew() {
      currentSessionId = null;
      currentAgenticSessionId = null;
      sessionArea.style.display = 'none';
      clearResults();
      fileInput.value = '';
      uploadArea.classList.remove('has-file');
      question.value = '';
    }

    async function handleFollowup() {
      const q = followup.value.trim();
      const sessionId = currentMode === 'agentic' ? currentAgenticSessionId : currentSessionId;
      if (!q || !sessionId) return;

      hideError();
      followupBtn.disabled = true;
      spinner.style.display = 'block';
      if (currentMode === 'agentic') {
        thinkingCard.style.display = 'block';
      }

      try {
        // Use agentic followup endpoint for agentic mode, regular for standard
        const endpoint = currentMode === 'agentic' ? '/api/analyze/agentic/followup' : '/api/analyze/followup';
        const res = await fetch(endpoint, {
          method: 'POST',
          body: new URLSearchParams({ session_id: sessionId, question: q })
        });
        
        if (!res.ok) {
          const data = await res.json();
          const err = data.detail?.message ? data.detail : { message: data.detail || 'An error occurred' };
          throw new Error(err.message);
        }
        
        // If agentic mode, use streaming
        if (currentMode === 'agentic') {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let stepIndex = 0;
          
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                try {
                  const step = JSON.parse(line.slice(6));
                  if (step.error) {
                    const err = step.error.message || step.error;
                    showError(err);
                    break;
                  }
                  if (step.type === 'done') {
                    spinner.style.display = 'none';
                    thinkingCard.style.display = 'none';
                    continue;
                  }
                  spinner.style.display = 'none';
                  thinkingCard.style.display = 'none';
                  const stepEl = createStepElement(step, stepIndex++);
                  timeline.appendChild(stepEl);
                  timeline.style.display = 'flex';
                  timeline.scrollTop = timeline.scrollHeight;
                } catch (e) {}
              }
            }
          }
        } else {
          // Standard mode - just show the answer
          const data = await res.json();
          answerDiv.textContent = data.answer || 'No answer received';
          answerDiv.style.display = 'block';
          spinner.style.display = 'none';
        }
      } catch (err) {
        showError(err.message);
        spinner.style.display = 'none';
      } finally {
        followupBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
